<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free beautiful wallpapers created by Ibad">
  <title>Wallpapers by Ibad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Wallpapers</h1>
      <p class="subtitle">Created by Ibad</p>
      <p class="tagline">High-quality wallpapers for your desktop • Free to download</p>
    </div>
  </header>

  <main class="container">
    <section class="gallery">
      
      <div class="card">
        <img src="images/wallpaper1.jpg" alt="Mountain Lake" loading="lazy">
        <div class="card-overlay">
          <h3>Mountain Lake</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper1.jpg" 
                  data-name="Mountain-Lake.jpg">
            Download
          </button>
        </div>
      </div>

      <div class="card">
        <img src="images/wallpaper2.jpg" alt="Forest" loading="lazy">
        <div class="card-overlay">
          <h3>Forest</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper2.jpg" 
                  data-name="Forest.jpg">
            Download
          </button>
        </div>
      </div>

      <div class="card">
        <img src="images/wallpaper3.jpg" alt="Ocean Sunset" loading="lazy">
        <div class="card-overlay">
          <h3>Ocean Sunset</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper3.jpg" 
                  data-name="Ocean-Sunset.jpg">
            Download
          </button>
        </div>
      </div>

      <div class="card">
        <img src="images/wallpaper4.jpg" alt="City Night" loading="lazy">
        <div class="card-overlay">
          <h3>City Night</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper4.jpg" 
                  data-name="City-Night.jpg">
            Download
          </button>
        </div>
      </div>

      <div class="card">
        <img src="images/wallpaper5.jpg" alt="Abstract" loading="lazy">
        <div class="card-overlay">
          <h3>Abstract</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper5.jpg" 
                  data-name="Abstract.jpg">
            Download
          </button>
        </div>
      </div>

      <div class="card">
        <img src="images/wallpaper6.jpg" alt="Sunrise" loading="lazy">
        <div class="card-overlay">
          <h3>Sunrise</h3>
          <button class="btn btn-download" 
                  data-image="images/wallpaper6.jpg" 
                  data-name="Sunrise.jpg">
            Download
          </button>
        </div>
      </div>

    </section>
  </main>

  <footer>
    <p>&copy; 2026 Wallpapers by Ibad. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
